<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生产基地 · 东莞简依玩具有限公司</title>
  <link rel="icon" href="assets/img/image1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />

<body data-page="bases">
  <div id="app-header"></div>

  <main>
    <section id="bases" class="section">
      <div class="container">
        <p class="section-index">02</p>
        <h2 class="section-title" data-i18n="bases.title">生产基地</h2>
        <p class="section-lead" data-i18n="bases.lead">研发、量产、协作三位一体，覆盖从打样到大规模交付的全流程。</p>
        <div class="cards">
          <article class="card base-card">
            <div class="card-body">
              <span class="card-tag" data-i18n="bases.tag1">研发打样中心</span>
              <h3 data-i18n="bases.name1">茶山工厂</h3>
              <p class="scale" data-i18n="bases.scale1">50 人 · 人员规模</p>
              <p data-i18n="bases.desc1">研发与打样核心基地，资深版师把控新品开发、打样确认与客户验样，从源头确保品质。</p>
            </div>
          </article>
          <article class="card base-card">
            <div class="card-body">
              <span class="card-tag" data-i18n="bases.tag2">大批量量产基地</span>
              <h3 data-i18n="bases.name2">四川工厂</h3>
              <p class="scale" data-i18n="bases.scale2">200 人 · 人员规模</p>
              <p data-i18n="bases.desc2">最大生产基地，完善流水线与成熟工人团队，专承接大规模量产，保障交期与品质一致。</p>
            </div>
          </article>
          <article class="card base-card">
            <div class="card-body">
              <span class="card-tag" data-i18n="bases.tag3">灵活配套体系</span>
              <h3 data-i18n="bases.name3">协作工厂网络</h3>
              <p class="scale" data-i18n="bases.scale3">多家 · 合作规模</p>
              <p data-i18n="bases.desc3">长期合作的优质协作工厂，涵盖配件、特种印刷、包装等专项工艺，灵活应对多样需求。</p>
            </div>
          </article>
        </div>

        <h3 class="subsection-title" data-i18n="bases.siteTitle">生产现场</h3>
        <div class="gallery">
          <figure><img src="assets/img/image5.jpeg" alt="" loading="lazy" /><figcaption data-i18n="gallery.cap1">毛绒半成品流转</figcaption></figure>
          <figure><img src="assets/img/image7.jpeg" alt="" loading="lazy" /><figcaption data-i18n="gallery.cap2">量产车缝车间</figcaption></figure>
          <figure><img src="assets/img/image8.jpeg" alt="" loading="lazy" /><figcaption data-i18n="gallery.cap3">车缝生产线</figcaption></figure>
          <figure><img src="assets/img/image6.jpeg" alt="" loading="lazy" /><figcaption data-i18n="gallery.cap4">精细缝制工序</figcaption></figure>
        </div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>
  <script src="i18n.js?v=10"></script>
