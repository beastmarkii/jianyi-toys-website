<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="assets/img/image1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body data-page="brands">
  <div id="app-header"></div>

  <main>
    <section id="brands" class="section">
      <div class="container">
        <p class="section-index">06</p>
        <h2 class="section-title" data-i18n="brands.title">主要合作品牌</h2>
        <p class="section-lead" data-i18n="brands.lead">与全球顶级 IP 品牌长期合作，严守授权规范与品质标准。</p>
        <div class="brand-grid">
          <article class="brand-card">
            <h3 class="brand-name-lg" data-i18n-html="brands.sanrioName">Sanrio <span>三丽鸥</span></h3>
            <dl class="brand-info">
              <div><dt data-i18n="brands.dt1">品牌定位</dt><dd data-i18n="brands.sanrio1">全球知名日系 IP 品牌</dd></div>
              <div><dt data-i18n="brands.dt2">代表 IP</dt><dd data-i18n="brands.sanrio2">Hello Kitty、My Melody、Cinnamoroll</dd></div>
              <div><dt data-i18n="brands.dt3">合作内容</dt><dd data-i18n="brands.sanrio3">授权毛绒公仔及周边制造</dd></div>
              <div><dt data-i18n="brands.dt4">品质要求</dt><dd data-i18n="brands.sanrio4">日系高标准，严格还原品牌形象</dd></div>
            </dl>
          </article>
          <article class="brand-card">
            <h3 class="brand-name-lg" data-i18n-html="brands.popmartName">Pop Mart <span>泡泡玛特</span></h3>
            <dl class="brand-info">
              <div><dt data-i18n="brands.dt1">品牌定位</dt><dd data-i18n="brands.popmart1">中国潮流玩具领军企业</dd></div>
              <div><dt data-i18n="brands.dt2">代表 IP</dt><dd data-i18n="brands.popmart2">Molly、Labubu、Dimoo</dd></div>
              <div><dt data-i18n="brands.dt3">合作内容</dt><dd data-i18n="brands.popmart3">核心毛绒产品制造供应商</dd></div>
              <div><dt data-i18n="brands.dt4">品质要求</dt><dd data-i18n="brands.popmart4">精细度高，全球销售统一标准</dd></div>
            </dl>
          </article>
        </div>

      </div>
    </section>
  </main>

  <div id="app-footer"></div>
  <script src="i18n.js?v=12"></script>
  <script src="layout.js?v=12"></script>
  <script src="script.js?v=12"></script>
