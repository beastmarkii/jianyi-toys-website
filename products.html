<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品 · 东莞简依玩具有限公司</title>
  <link rel="icon" href="assets/img/image1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=12" />
</head>
<body data-page="products">
  <div id="app-header"></div>

  <main>
    <section id="products" class="section">
      <div class="container">
        <p class="section-index">05</p>
        <h2 class="section-title" data-i18n="products.title">产品展示</h2>
        <p class="section-lead" data-i18n="products.lead">精细工艺打造的毛绒公仔，触感柔软、形象生动。</p>
        <div class="product-grid">
          <figure class="product">
            <div class="product-img"><img src="assets/img/image20.jpeg" alt="Pink Rabbit" loading="lazy" /></div>
            <figcaption><span class="p-cn" data-i18n="products.n1main">粉兔公仔</span><span class="p-en" data-i18n="products.n1sub">Pink Rabbit</span></figcaption>
          </figure>
          <figure class="product">
            <div class="product-img"><img src="assets/img/image21.jpeg" alt="Penguin" loading="lazy" /></div>
            <figcaption><span class="p-cn" data-i18n="products.n2main">企鹅公仔</span><span class="p-en" data-i18n="products.n2sub">Penguin</span></figcaption>
          </figure>
          <figure class="product">
            <div class="product-img"><img src="assets/img/image22.jpeg" alt="Yellow Duck" loading="lazy" /></div>
            <figcaption><span class="p-cn" data-i18n="products.n3main">黄鸭公仔</span><span class="p-en" data-i18n="products.n3sub">Yellow Duck</span></figcaption>
          </figure>
          <figure class="product">
            <div class="product-img"><img src="assets/img/image23.jpeg" alt="Teddy Bear" loading="lazy" /></div>
            <figcaption><span class="p-cn" data-i18n="products.n4main">泰迪熊</span><span class="p-en" data-i18n="products.n4sub">Teddy Bear</span></figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>
  <script src="i18n.js?v=12"></script>
  <script src="layout.js?v=12"></script>
  <script src="script.js?v=12"></script>
</body>
</html>
