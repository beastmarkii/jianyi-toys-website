          <div class="about-text">
            <p data-i18n-html="about.p1">本公司是一家深耕玩具制造行业超过 <strong>15 年</strong>的专业厂商，专注于毛绒公仔、IP 周边产品的研发与生产。凭借精湛的工艺与严格的品质管理体系，赢得 <strong>Sanrio</strong>、<strong>Pop Mart</strong> 等全球顶级品牌的长期信任。</p>
            <p data-i18n-html="about.p2">在茶山与四川设有主要生产基地，并与多家优质协作工厂稳定合作，形成强大供应链网络，月产能高达 <strong>50 万件</strong>，可快速响应大规模订单。</p>
