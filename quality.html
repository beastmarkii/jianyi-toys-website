<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>品质管理 · 东莞简依玩具有限公司</title>
  <link rel="icon" href="assets/img/image1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=11" />

<body data-page="quality">
  <div id="app-header"></div>

  <main>
    <section id="quality" class="section">
      <div class="container">
        <p class="section-index">04</p>
        <h2 class="section-title" data-i18n="quality.title">品质管理</h2>
        <p class="section-lead" data-i18n="quality.lead">从原料到出货，全流程严控，确保每批产品 100% 合规达标。</p>
        <div class="cards quality-cards">
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q1t">原材料检验</h3><p data-i18n="quality.q1d">入库前严检面料色差、甲醛含量、填充物蓬松度，不合格一律退换。</p></div></article>
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q2t">过程品质管控</h3><p data-i18n="quality.q2d">初检、中检、终检三道关卡，问题产品即时标记隔离。</p></div></article>
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q3t">成品 100% 全检</h3><p data-i18n="quality.q3d">出货前全检，涵盖外观、尺寸与安全性能（拉力测试等）。</p></div></article>
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q4t">第三方检测</h3><p data-i18n="quality.q4d">配合 SGS、BV 等机构认证，符合 EN71、ASTM F963、GB6675 标准。</p></div></article>
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q5t">客诉快速响应</h3><p data-i18n="quality.q5d">24 小时内响应，48 小时提出解决方案，追溯根因持续改进。</p></div></article>
          <article class="card"><div class="card-body"><h3 data-i18n="quality.q6t">品质数据追溯</h3><p data-i18n="quality.q6d">每批产品建立完整档案，物料批次、生产日期、QC 签核全程可追溯。</p></div></article>
        </div>
      </div>
    </section>
  </main>

  <div id="app-footer"></div>
